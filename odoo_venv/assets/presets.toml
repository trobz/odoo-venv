# This file contains presets for the odoo-venv command.
#
# Available options:
#
# install_odoo (boolean):
#   Install Odoo in editable mode.
#   Default: true
#
# install_odoo_requirements (boolean):
#   Install packages from Odoo's requirement.txt.
#   Default: true
#
# ignore_from_odoo_requirements (string):
#   Comma-separated list of packages to ignore from Odoo's requirement.txt.
#
# install_addons_dirs_requirements (boolean):
#   Install requirements.txt found in addons paths.
#   Default: false
#
# ignore_from_addons_dirs_requirements (string):
#   Comma-separated list of packages to ignore from addons paths' requirement.txt.
#
# install_addons_manifests_requirements (boolean):
#   Install requirements from addons' manifests.
#   Default: false
#
# ignore_from_addons_manifests_requirements (string):
#   Comma-separated list of packages to ignore from addons' manifests.
#
# extra_requirements_file (string):
#   Path to an extra requirements file.
#
# extra_requirement (string):
#   Comma-separated list of extra packages to install.
#
# extra_commands (array of tables):
#   Additional commands to run at specific points during venv creation.
#   Each command can have a 'when' marker to conditionally run based on odoo_version.
#   Supported stages: 'after_venv', 'after_requirements', 'after_odoo_install'
#
#   Example:
#   [[common.extra_commands]]
#   command = ["uv", "pip", "install", "setuptools<58.0"]
#   when = "odoo_version <= '13.0'"
#   stage = "after_venv"
#
#   You can also set environment variables for the command:
#   [[common.extra_commands]]
#   command = ["uv", "pip", "install", "vatnumber==1.2"]
#   when = "odoo_version <= '13.0'"
#   stage = "after_venv"
#   env = { UV_NO_BUILD_ISOLATION = "1" }
#
#   Available markers in 'when' expressions:
#   - odoo_version: The Odoo version (e.g., '13.0', '14.0')
#   - python_version: The Python version (e.g., '3.7', '3.10')
#   - All standard packaging markers (sys_platform, etc.)
#
#   Marker syntax examples:
#     when = "odoo_version <= '13.0'"                          # Single condition
#     when = "odoo_version == '13.0' or odoo_version == '12.0'" # OR: runs if either is true
#     when = "odoo_version <= '13.0' and python_version >= '3.7'" # AND: runs only if both are true
#     when = "odoo_version == '13.0' or odoo_version == '14.0' and python_version == '3.8'"
#            # ↑ Evaluates as: odoo_version == '13.0' or (odoo_version == '14.0' and python_version == '3.8')
#            # 'and' has higher precedence than 'or' (binds tighter)
#     when = ""  # Empty = always runs (same as omitting 'when')
#
#   Limitations:
#   - Parentheses NOT supported - cannot write: (a or b) and c
#   - Use precedence: 'and' binds tighter than 'or'
#

[common]

description = """
common configuration to all presets
"""

# on ubuntu 22.04/24.04, gevent fails to install with python 3.10
# that we use for odoo 16.0, 17.0, 18.0, 19.0
# see https://github.com/odoo/odoo/issues/187021
#
# pyldap is unmaintained and fails to build on OpenLDAP 2.5+ (libldap_r removed).
# Odoo 13+ replaced it with python-ldap: https://github.com/odoo/odoo/issues/40069
#
# reportlab==3.3.0 (Odoo 12) has C extensions (_renderPM) that fail to build on modern systems.
# Odoo 13 uses reportlab==3.5.13 which has a modernized build system.
#
# reportlab==3.5.59 (Odoo 16, python_version <= '3.10') has C extensions that fail to
# compile on Python 3.10 due to removed PyUnicode_AsUnicode API. Odoo 16 already uses
# reportlab==3.6.12 for python_version > '3.10', so we use that as the replacement.
#
# psycopg2 2.7.x uses Python 2's `basestring`, causing NameError on Python 3.
# The 2.8.x line fixed this. Odoo 12 already pins 2.8.3 for python >= 3.8.
#
# pyopenssl<23.2.0 lacks upper bound on cryptography in its metadata. When an OCA addon
# mentions cryptography (triggering auto-ignore of Odoo's cryptography pin), the latest
# cryptography (41+) gets installed alongside old pyopenssl, causing:
#   AttributeError: module 'lib' has no attribute 'X509_V_FLAG_NOTIFY_POLICY'
# Odoo 15 pins pyopenssl==19.0.0 + cryptography==2.6.1,
# Odoo 16 pins pyopenssl==20.0.1 + cryptography==3.4.8,
# Odoo 17 pins pyopenssl==21.0.0 + cryptography==3.4.8.
# All three must be replaced together — they are a tightly-coupled trio with urllib3.
#
# urllib3==1.26.5 (Odoo 15-17) uses cryptography.hazmat.backends.openssl.x509._Certificate,
# an internal path removed in cryptography 42+. urllib3>=1.26.14 uses the public API instead.
# We pin 1.26.14 as the earliest 1.26.x that avoids this import, and stays within
# requests==2.25.1's requirement of urllib3>=1.21.1,<1.27.
# NOTE: urllib3 replacement is in extra_commands (not extra_requirement) because it needs
# odoo_version scoping — Odoo 12/13/14 pin requests<2.25 which requires urllib3<1.25.

ignore_from_odoo_requirements = """
gevent==21.8.0; sys_platform != 'win32' and python_version == '3.10',
greenlet==1.1.2; sys_platform != 'win32' and python_version == '3.10',
cbor2==5.4.2 ; python_version < '3.12',
urllib3==1.26.5; python_version < '3.12',
pyldap; sys_platform != 'win32',
python-ldap==3.4.0 ; sys_platform != 'win32' and python_version < '3.12',
reportlab==3.3.0; python_version < '3.8',
reportlab==3.5.59; python_version == '3.10',
psycopg2==2.7.3.1; sys_platform != 'win32' and python_version < '3.8',
pyopenssl==19.0.0,
pyopenssl==20.0.1,
pyopenssl==21.0.0,
cryptography<41.0.0
"""
# python-ldap 3.4.0 fails on OpenLDAP 2.5+ (Arch, Fedora 36+, etc.)
# because it hardcodes -lldap_r which was removed.
# Bump to 3.4.2 which supports OpenLDAP 2.5+.
# TMP: remove once https://github.com/odoo/odoo/pull/109217 is merged
extra_requirement = """
gevent==22.10.2; sys_platform == 'linux' and python_version == '3.10',
greenlet==2.0.2; sys_platform == 'linux' and python_version == '3.10',
python-ldap==3.4.2 ; sys_platform != 'win32' and python_version < '3.12',
reportlab==3.5.13; python_version < '3.8',
reportlab==3.6.12; python_version == '3.10',
psycopg2==2.8.3; sys_platform != 'win32' and python_version < '3.8',
pyopenssl>=24.0.0,
cryptography>=41.0.5
"""

# always ignore those exotic requirements unless explicitely added
ignore_from_addons_dirs_requirements = "azure-identity,mysql,mysqlclient,pymssql,cn2an"

# Keep setuptools below versions that break Odoo compatibility:
# - Odoo <= 13.0: handled automatically by odoo-venv (setuptools<58 + wheel)
# - Odoo 14.0 to 17.0 needs setuptools<82.0 because pkg_resources is required
[[common.extra_commands]]
command = ["uv", "pip", "install", "setuptools<82.0"]
when = "odoo_version > '13.0' and odoo_version <= '17.0'"
stage = "after_requirements"

# setuptools>=82.0 breaks gevent==22.10.2 which we pin for Python 3.10
[[common.extra_commands]]
command = ["uv", "pip", "install", "setuptools<82.0"]
when = "odoo_version > '17.0' and python_version == '3.10'"
stage = "after_requirements"

# Install cbor2==5.4.3 for Odoo >= 18.0
# TMP: remove once proper fix is merged in odoo
# See https://github.com/OCA/oca-ci/pull/119
[[common.extra_commands]]
command = ["uv", "pip", "install", "cbor2==5.4.3"]
when = "odoo_version >= '18.0' and python_version == '3.10'"
stage = "after_requirements"
env = { UV_NO_BUILD_ISOLATION = "1" }

# urllib3==1.26.5 (Odoo 14-17, python <3.12) is incompatible with cryptography 42+
# (uses removed internal API). Replace with 1.26.14 which uses the public API.
# Scoped to Odoo 15+ because:
# - Odoo 12/13 don't pin urllib3 at all, and requests<2.25 requires urllib3<1.25
# - Odoo 14 pins urllib3 only for python>3.9, but is not in the CI matrix for py3.10
# Odoo 18+ ships urllib3 2.x on py3.12 and doesn't pin 1.26.x on py3.10.
[[common.extra_commands]]
command = ["uv", "pip", "install", "urllib3==1.26.14"]
when = "odoo_version >= '15.0' and odoo_version < '18.0' and python_version < '3.12'"
stage = "after_requirements"

[local]

description = """
\n- for generic venv-odooXX local venvs that we use to work on OCA modules
\n- adding some packages for dev-only purposes
"""

install_addons_dirs_requirements = true
install_addons_manifests_requirements = true
extra_requirement = "debugpy,ipython,setproctitle,watchdog,jingtrang,websocket-client,coverage,pylint-odoo,astroid,pdfminer.six,fonttools"

[demo]

description = """
- for odoo demo instances
- we install all modules requirements in advance: we don't want a user to be blocked from installing an odoo module because of a missing dep
"""

install_addons_dirs_requirements = true
install_addons_manifests_requirements = true
extra_requirement = "pdfminer.six,fonttools"

[project]

description = """
\n- for projects (any stage: dev/integration/staging/production)
\n- we want only the dependencies needed for the project to be installed, not more
"""

install_addons_dirs_requirements = false
install_addons_manifests_requirements = false
extra_requirements_file = "./requirements.txt"
extra_requirement = "pdfminer.six,fonttools"

[ci]

description = """
\n- for running tests
"""

install_addons_dirs_requirements = true
install_addons_manifests_requirements = true
extra_requirements_file = "./requirements.txt"
extra_requirement = "websocket-client,coverage,pylint,astroid,pdfminer.six,fonttools"
